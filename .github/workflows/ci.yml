name: CardioPredict CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Lint with flake8
      run: |
        # Arrête le build s'il y a des erreurs de syntaxe graves
        flake8 src/ app/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics
        # Affiche le reste comme de simples avertissements
        flake8 src/ app/ tests/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Run Tests with pytest
      run: |
        pytest tests/